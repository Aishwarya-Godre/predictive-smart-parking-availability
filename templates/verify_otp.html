<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP - ParkEase</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-100 min-h-screen flex items-center justify-center font-sans">

  <div class="bg-pink-200 shadow-lg rounded-xl p-8 max-w-md w-full">
    <h1 class="text-3xl font-bold text-center text-pink-900 mb-6">OTP Verification</h1>
    <p class="text-center text-pink-800 mb-6">
      Please enter the OTP sent to your email to complete signup.
    </p>

    <form method="POST" class="space-y-4">
      <div>
        <label class="block text-pink-800 font-semibold mb-2">Enter OTP:</label>
        <input type="text" name="otp" required
               class="w-full px-4 py-2 rounded-lg border border-pink-300 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent">
      </div>

      <button type="submit"
              class="w-full bg-pink-600 hover:bg-pink-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
        Verify OTP
      </button>
    </form>

    <p class="text-center text-pink-800 mt-6 text-sm">
      Didn't receive OTP? <a href="/signup" class="text-pink-900 font-semibold hover:underline">Resend OTP</a>
    </p>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkEase — Join Us</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #0a0612;
  --purple: #a855f7;
  --purple2: #7c3aed;
  --text: #f3e8ff;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 50% 50%, rgba(124,58,237,0.1) 0%, transparent 80%);
}
.glass {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(168, 85, 247, 0.15);
  border-radius: 24px;
}
input {
  background: rgba(255,255,255,0.05) !important;
  border: 1px solid rgba(168, 85, 247, 0.2) !important;
  color: white !important;
  outline: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--purple2), var(--purple));
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
}
</style>
</head>
<body class="p-6">

<div class="glass p-10 w-full max-w-md text-center">
  <div class="text-4xl mb-6">🚀</div>
  <h2 class="text-3xl font-black italic mb-2">Create Account</h2>
  <p class="text-purple-300/60 mb-8">Start your smart parking journey</p>

  <form id="signupForm" class="space-y-4">
    <input type="text" id="name" placeholder="Full Name" class="w-full p-4 rounded-xl" required>
    <input type="email" id="email" placeholder="Email Address" class="w-full p-4 rounded-xl" required>
    <input type="password" id="password" placeholder="Create Password" class="w-full p-4 rounded-xl" required>
    <button type="button" id="sendOtpBtn" class="w-full p-4 btn-primary rounded-xl font-bold text-lg mt-4 hover:scale-[1.02] transition-transform">
      Send OTP
    </button>
    
    <div id="otpSection" class="hidden space-y-4 mt-6">
      <input type="text" id="otp" placeholder="Enter 6-digit OTP" class="w-full p-4 rounded-xl">
      <button type="button" id="verifyOtpBtn" class="w-full p-4 bg-green-500 hover:bg-green-600 rounded-xl font-bold text-lg">
        Verify & Sign Up
      </button>
    </div>
  </form>

  <div class="mt-8 text-sm">
    Already have an account? <a href="/login" class="text-purple-400 font-bold hover:underline">Log In</a>
  </div>
</div>

<script>
const sendOtpBtn = document.getElementById("sendOtpBtn");
const verifyOtpBtn = document.getElementById("verifyOtpBtn");
const otpSection = document.getElementById("otpSection");

sendOtpBtn.addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const name = document.getElementById("name").value;
    if(!email) return alert("Enter email");
    
    try {
        const res = await fetch("/send-otp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, name})
        });
        const data = await res.json();
        if(data.success) {
            alert("OTP Sent!");
            otpSection.classList.remove("hidden");
            sendOtpBtn.classList.add("hidden");
        }
    } catch(e) { alert("Error sending OTP"); }
});

verifyOtpBtn.addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;
    const name = document.getElementById("name").value;
    const password = document.getElementById("password").value;

    try {
        const res = await fetch("/verify-otp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email, otp})
        });
        const data = await res.json();
        if(data.success) {
            const regRes = await fetch("/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({name, email, password})
            });
            const regData = await regRes.json();
            if(regData.success) {
                alert("Signup Success!");
                window.location.href = '/login';
            } else { alert(regData.message); }
        } else { alert("Wrong OTP"); }
    } catch(e) { alert("Verification error"); }
});
</script>

</body>
</html>

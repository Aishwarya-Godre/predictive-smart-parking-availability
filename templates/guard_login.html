<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkEase — Guard Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #0a0612;
  --emerald: #10b981;
  --emerald2: #059669;
  --text: #ecfdf5;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 50% 50%, rgba(124,58,237,0.1) 0%, transparent 80%);
}
.glass {
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(16, 185, 129, 0.15);
  border-radius: 24px;
}
input {
  background: rgba(255,255,255,0.05) !important;
  border: 1px solid rgba(16, 185, 129, 0.2) !important;
  color: white !important;
  outline: none;
}
input:focus {
  border-color: var(--emerald) !important;
  box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
}

.btn-emerald {
  background: linear-gradient(135deg, var(--emerald2), var(--emerald));
  box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
}
</style>
</head>
<body class="p-6">

<div class="glass p-10 w-full max-w-md text-center">
  <div class="text-4xl mb-6">👮</div>
  <h2 class="text-3xl font-black italic mb-2">Guard Access</h2>
  <p class="text-emerald-300/60 mb-8">Nanded City Smart Parking Security</p>

  <form id="guardLoginForm" class="space-y-4">
    <input type="email" id="email" placeholder="Guard Email" class="w-full p-4 rounded-xl" required>
    <input type="password" id="password" placeholder="Password" class="w-full p-4 rounded-xl" required>
    <button type="submit" class="w-full p-4 btn-emerald rounded-xl font-bold text-lg mt-4 hover:scale-[1.02] transition-transform text-white">
      Log In to Security HUD
    </button>
  </form>

  <div class="mt-8 text-sm">
    Return to <a href="/" class="text-emerald-400 font-bold hover:underline">Home</a>
  </div>
  <p id="msg" class="mt-4 text-sm text-red-400"></p>
</div>

<script>
document.getElementById('guardLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/login-guard', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if(data.success) {
            localStorage.setItem('guardAuth', 'true');
            localStorage.setItem('guardArea', data.area);
            window.location.href = '/guard-dashboard?area=' + encodeURIComponent(data.area);
        } else {
            document.getElementById('msg').innerText = data.message || "Incorrect guard credentials";
        }
    } catch(err) {
        document.getElementById('msg').innerText = "Server error";
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParkEase — Book Your Slot</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #0a0612;
  --purple: #a855f7;
  --purple2: #7c3aed;
  --text: #f3e8ff;
  --muted: #9874c0;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 50% 50%, rgba(124,58,237,0.15) 0%, transparent 80%);
}
.glass {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(168, 85, 247, 0.15);
  border-radius: 24px;
}
input, select {
  background: rgba(255,255,255,0.05) !important;
  border: 1px solid rgba(168, 85, 247, 0.2) !important;
  color: white !important;
  outline: none;
  transition: all 0.3s ease;
}
input:focus, select:focus {
  border-color: var(--purple) !important;
  box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
}
.btn-primary {
  background: linear-gradient(135deg, var(--purple2), var(--purple));
  box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
}
</style>
</head>
<body class="p-6">

<div class="glass p-8 md:p-12 w-full max-w-xl">
  <div class="flex justify-between items-center mb-6 pb-4 border-b border-purple-500/10">
    <a href="/dashboard" class="text-xs font-bold uppercase tracking-wider text-purple-300 hover:text-white transition-all flex items-center gap-1.5">
      <span>←</span> Dashboard
    </a>
    <button type="button" onclick="logoutUser()" class="text-xs font-bold uppercase tracking-wider text-red-400 hover:text-red-300 transition-all bg-red-500/10 hover:bg-red-500/20 border border-red-500/25 hover:border-red-500/40 px-3 py-1.5 rounded-lg flex items-center gap-1">
      <span>🚪</span> Log Out
    </button>
  </div>

  <div class="text-center mb-10">
    <div class="text-4xl mb-4">🅿️</div>
    <h2 class="text-3xl font-black italic">Book Your Slot</h2>
    <p class="text-muted mt-2">Nanded City Smart Parking Network</p>
  </div>

  <form id="bookingForm" class="space-y-5">
    <div>
      <label class="block text-xs font-bold tracking-widest text-muted uppercase mb-2">Location</label>
      <input type="text" id="loc_display" class="w-full p-4 rounded-xl" readonly placeholder="Select a location from dashboard">
      <input type="hidden" id="loc_key">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-bold tracking-widest text-muted uppercase mb-2">Slot ID</label>
        <input id="slot_id" placeholder="e.g. A-12" class="w-full p-4 rounded-xl" required>
      </div>
      <div>
        <label class="block text-xs font-bold tracking-widest text-muted uppercase mb-2">Vehicle No</label>
        <input id="vehicle" placeholder="MH-26-XX-XXXX" class="w-full p-4 rounded-xl" required>
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold tracking-widest text-muted uppercase mb-2">Full Name</label>
      <input id="name" placeholder="Your Name" class="w-full p-4 rounded-xl" required>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-bold tracking-widest text-muted uppercase mb-2">Email</label>
        <input id="email" type="email" placeholder="email@example.com" class="w-full p-4 rounded-xl" required>
      </div>
      <div>
        <label class="block text-xs font-bold tracking-widest text-muted uppercase mb-2">Mobile</label>
        <input id="mobile" placeholder="Phone Number" class="w-full p-4 rounded-xl" required>
      </div>
    </div>

    <div>
      <label class="block text-xs font-bold tracking-widest text-muted uppercase mb-2">Aadhar / License Number</label>
      <input id="aadhar" placeholder="ID Number for verification" class="w-full p-4 rounded-xl" required>
    </div>

    <div class="p-4 rounded-xl bg-white/5 border border-purple-500/20">
      <div class="flex justify-between items-center mb-4">
        <label class="text-xs font-bold tracking-widest text-muted uppercase">Parking Duration</label>
        <div class="flex items-center space-x-3">
          <input type="number" id="hours" value="1" min="1" max="24" class="w-20 p-2 rounded-lg text-center" oninput="updateCharge()">
          <span class="text-sm font-semibold text-purple-300">Hours</span>
        </div>
      </div>
      <div class="flex justify-between items-center pt-4 border-t border-white/5">
        <span class="text-sm font-bold text-muted uppercase">Total Charge</span>
        <span class="text-2xl font-black text-purple-400 transition-all duration-300" id="total_charge">₹30</span>
      </div>
    </div>

    <button type="submit" class="w-full p-5 mt-4 btn-primary rounded-xl font-bold text-lg hover:scale-[1.02] transition-transform">
      Confirm Booking
    </button>

    <div id="statusMsg" class="hidden p-4 rounded-xl text-center font-bold"></div>
  </form>
</div>

<!-- PAYMENT MODAL -->
<div id="paymentModal" class="hidden fixed inset-0 z-[10000] bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
  <div class="glass p-8 w-full max-w-md text-center">
    <h3 class="text-2xl font-black italic mb-2 text-purple-400">SCAN & PAY</h3>
    <p class="text-muted text-xs mb-6">Scan using PhonePe or any UPI App</p>
    
    <div class="flex flex-col items-center gap-4 mb-6">
        <!-- YOUR STATIC PHONEPE SCANNER IMAGE -->
        <div class="relative group">
            <img src="/static/phonepe_qr.png" onerror="this.src='https://placehold.co/200x200/58288b/ffffff?text=YOUR+QR+HERE'; this.classList.add('opacity-50')" 
                 class="w-48 h-48 rounded-2xl border-4 border-purple-500/30 shadow-[0_0_20px_rgba(168,85,247,0.3)]">
            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/60 rounded-2xl">
                <span class="text-[10px] text-white">Save your QR as static/phonepe_qr.png</span>
            </div>
        </div>

        <div class="text-muted text-[10px] uppercase tracking-widest">OR USE DYNAMIC QR</div>

        <!-- Dynamic QR Code (Has the amount pre-filled) -->
        <div class="bg-white p-2 rounded-xl inline-block">
            <div id="qrcode" class="w-32 h-32"></div>
        </div>
    </div>

    <div class="mb-6">
        <p class="text-muted text-xs uppercase tracking-widest mb-1">Total Amount</p>
        <p id="modal_amount" class="text-3xl font-black text-white">₹30</p>
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-[10px] font-bold text-muted uppercase mb-2 text-left">Upload Payment Screenshot</label>
            <input type="file" id="payProof" class="w-full text-xs p-3 rounded-xl bg-white/5 border border-white/10" accept="image/*">
        </div>
        
        <button onclick="finalizeBooking()" class="w-full p-4 btn-primary rounded-xl font-bold hover:scale-105 transition-all">
            I HAVE PAID — SUBMIT BOOKING
        </button>
        <button onclick="closePayment()" class="text-muted text-xs hover:text-white mt-2">Cancel Transaction</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// --- CONFIG: Change this to your PhonePe UPI ID ---
const MY_UPI_ID = "9119475105@ybl"; // <-- REPLACE WITH YOUR UPI ID
// ------------------------------------------------

let pendingBookingData = null;

// Pre-fill from URL
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const loc = params.get('loc');
    const name = params.get('name');
    const slot = params.get('slot');
    if(loc && name) {
        document.getElementById('loc_key').value = loc;
        document.getElementById('loc_display').value = name;
    }
    if(slot) {
        document.getElementById('slot_id').value = slot;
    }
};

const form = document.getElementById('bookingForm');
const statusMsg = document.getElementById('statusMsg');

function updateCharge() {
    const hours = document.getElementById('hours').value || 1;
    const charge = hours * 30;
    document.getElementById('total_charge').textContent = `₹${charge}`;
}

form.addEventListener('submit', (e) => {
    e.preventDefault();
    
    pendingBookingData = {
        loc_key: document.getElementById('loc_key').value || 'general',
        slot_id: document.getElementById('slot_id').value,
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        mobile: document.getElementById('mobile').value,
        aadhar: document.getElementById('aadhar').value,
        vehicle: document.getElementById('vehicle').value,
        hours: document.getElementById('hours').value,
        charge: parseInt(document.getElementById('total_charge').textContent.replace('₹', ''))
    };

    // Open Payment Modal
    document.getElementById('modal_amount').textContent = `₹${pendingBookingData.charge}`;
    document.getElementById('paymentModal').classList.remove('hidden');
    
    // Generate QR Code
    // Format: upi://pay?pa=VPA&pn=NAME&am=AMOUNT&cu=INR
    const upiLink = `upi://pay?pa=${MY_UPI_ID}&pn=ParkEase%20Parking&am=${pendingBookingData.charge}&cu=INR`;
    
    const qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML = ""; // Clear old QR
    new QRCode(qrContainer, {
        text: upiLink,
        width: 192,
        height: 192,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });
});

async function finalizeBooking() {
    const proofFile = document.getElementById('payProof').files[0];
    if(!proofFile) {
        alert("Please upload the payment screenshot as proof!");
        return;
    }

    statusMsg.className = "p-4 rounded-xl text-center font-bold block bg-purple-500/10 text-purple-400";
    statusMsg.textContent = "Submitting Booking Request...";
    document.getElementById('paymentModal').classList.add('hidden');

    try {
        const formData = new FormData();
        // Add all booking fields
        for (const key in pendingBookingData) {
            formData.append(key, pendingBookingData[key]);
        }
        // Add the screenshot file
        formData.append('screenshot', proofFile);

        const res = await fetch('/book-slot', {
            method: 'POST',
            body: formData
        });
        const result = await res.json();

        if(result.success) {
            statusMsg.className = "p-6 rounded-2xl text-center font-bold block bg-green-500/10 border border-green-500/30 text-green-300 space-y-4";
            statusMsg.innerHTML = `
                <div class="text-2xl">🎉</div>
                <div class="text-lg font-black text-white">Successfully Booked!</div>
                <div class="text-sm font-mono bg-white/5 py-2 px-3 rounded-lg border border-white/10 inline-block text-green-400">
                    Booking ID: ${result.booking_id}
                </div>
                <p class="text-xs text-muted font-normal max-w-xs mx-auto">
                    Payment proof has been submitted for administrative verification. You will receive a confirmation email shortly.
                </p>
                <div class="flex flex-col sm:flex-row gap-3 justify-center pt-2">
                    <a href="/dashboard" class="px-5 py-3 rounded-xl bg-purple-600 hover:bg-purple-700 text-white font-bold text-sm transition-all hover:scale-[1.02] flex items-center justify-center gap-2 shadow-lg shadow-purple-500/20">
                        📊 Back to Dashboard
                    </a>
                    <button type="button" onclick="logoutUser()" class="px-5 py-3 rounded-xl bg-white/5 hover:bg-red-500/20 hover:text-red-300 text-white font-bold text-sm transition-all hover:scale-[1.02] border border-white/10 hover:border-red-500/30 flex items-center justify-center gap-2">
                        🚪 Log Out
                    </button>
                </div>
            `;
            const submitBtn = form.querySelector('button[type="submit"]');
            if (submitBtn) submitBtn.style.display = 'none';
            form.reset();
        } else {
            statusMsg.className = "p-4 rounded-xl text-center font-bold block bg-red-500/20 text-red-400";
            statusMsg.textContent = result.message || "Booking failed.";
        }
    } catch(err) {
        statusMsg.className = "p-4 rounded-xl text-center font-bold block bg-red-500/20 text-red-400";
        statusMsg.textContent = "Server Error.";
    }
}

function logoutUser() {
    localStorage.removeItem('userName');
    window.location.replace('/login');
}

function closePayment() {
    document.getElementById('paymentModal').classList.add('hidden');
}
</script>

</body>
</html>


</body>
</html>
